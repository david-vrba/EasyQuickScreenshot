name: Release

# CD: push a version tag and this builds both binaries on a clean runner and
# publishes them to a GitHub release with checksums. One command ships a version:
#   git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # required to create the release

jobs:
  release:
    name: Build & publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build core
        run: cargo build --release

      - name: Build settings app
        run: cargo build --release --manifest-path settings-app/Cargo.toml

      - name: Stage binaries + checksums
        shell: bash
        run: |
          mkdir dist
          cp target/release/eqs.exe dist/
          cp settings-app/target/release/eqs-settings.exe dist/
          (cd dist && sha256sum *.exe > SHA256SUMS.txt && cat SHA256SUMS.txt)

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/eqs.exe
            dist/eqs-settings.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
